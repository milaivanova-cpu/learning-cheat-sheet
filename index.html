
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.map-wrap { padding: 1rem 0; }

@keyframes flowPulse {
  0%   { stroke-dashoffset: 24; opacity: 0.5; }
  100% { stroke-dashoffset: 0; opacity: 0.9; }
}
@keyframes nodeAppear {
  from { opacity: 0; transform: scale(0.93); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes highlightPulse {
  0%,100% { filter: drop-shadow(0 0 4px rgba(83,74,183,0.0)); }
  50%      { filter: drop-shadow(0 0 8px rgba(83,74,183,0.5)); }
}
@media (prefers-reduced-motion: no-preference) {
  .flow-line { animation: flowPulse 1.1s ease forwards; }
  .flow-node { animation: nodeAppear 0.45s ease forwards; }
  .scenario-highlight { animation: highlightPulse 1.8s ease-in-out 3; }
}
.flow-line { stroke-dasharray: 8 0; }
.flow-node-1 { animation-delay:0.1s; opacity:0; }
.flow-node-2 { animation-delay:0.3s; opacity:0; }
.flow-node-3 { animation-delay:0.5s; opacity:0; }
.flow-node-4 { animation-delay:0.7s; opacity:0; }
.flow-node-5 { animation-delay:0.9s; opacity:0; }
.fl1{animation-delay:0.2s;} .fl2{animation-delay:0.4s;} .fl3{animation-delay:0.6s;} .fl4{animation-delay:0.8s;}

.map-el { transition: opacity 0.35s, filter 0.35s; }
.map-el.dimmed  { opacity: 0.13; pointer-events: none; }
.map-el.lit     { opacity: 1; }
.map-el.ctx-default { opacity: 0.42; }
.map-el.ctx-default:hover { opacity: 1; }

/* Scenario bar */
.scenario-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
.sc-btn { font-size:12px; padding:7px 13px; border-radius: var(--border-radius-md); border:0.5px solid var(--color-border-secondary); background:var(--color-background-secondary); color:var(--color-text-secondary); cursor:pointer; transition:all 0.15s; line-height:1.3; text-align:left; }
.sc-btn:hover { border-color:var(--color-border-primary); color:var(--color-text-primary); background:var(--color-background-primary); }
.sc-btn.active { background:var(--color-text-primary); color:var(--color-background-primary); border-color:var(--color-text-primary); }
.sc-btn .sc-label { font-weight:500; display:block; }
.sc-btn .sc-sub { font-size:10px; opacity:0.7; display:block; margin-top:1px; }
.sc-reset { font-size:11px; padding:5px 10px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-tertiary); background:transparent; color:var(--color-text-secondary); cursor:pointer; align-self:center; }
.sc-reset:hover { color:var(--color-text-primary); }

/* Scenario explanation box */
.scenario-explanation {
  display:none; margin-bottom:14px;
  background:var(--color-background-secondary);
  border-radius:var(--border-radius-lg);
  border:0.5px solid var(--color-border-secondary);
  padding:14px 16px;
  animation: fadeIn 0.2s ease;
}
.scenario-explanation.visible { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);} }
.sc-exp-title { font-size:13px; font-weight:500; color:var(--color-text-primary); margin-bottom:6px; }
.sc-exp-body { font-size:13px; color:var(--color-text-secondary); line-height:1.7; }
.sc-exp-chain { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; align-items:center; }
.sc-chain-item { font-size:11px; padding:3px 9px; border-radius:10px; font-weight:500; }
.chain-red   { background:#FCEBEB; color:#A32D2D; }
.chain-amber { background:#FAEEDA; color:#633806; }
.chain-purple{ background:#EEEDFE; color:#3C3489; }
.chain-teal  { background:#E1F5EE; color:#085041; }
.chain-arrow { font-size:12px; color:var(--color-text-secondary); }

/* Detail panel */
.panel-overlay { display:none; margin-top:14px; background:var(--color-background-primary); border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-lg); padding:16px 18px; animation:fadeIn 0.15s ease; }
.panel-overlay.visible { display:block; }
.panel-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
.panel-title { font-size:15px; font-weight:500; color:var(--color-text-primary); }
.panel-close { font-size:18px; color:var(--color-text-secondary); cursor:pointer; line-height:1; padding:0 4px; }
.panel-close:hover { color:var(--color-text-primary); }
.panel-body { font-size:13px; color:var(--color-text-secondary); line-height:1.75; margin-bottom:12px; }
.panel-q { font-size:13px; color:var(--color-text-primary); background:var(--color-background-warning); border-left:2px solid #BA7517; padding:8px 12px; border-radius:0 var(--border-radius-md) var(--border-radius-md) 0; font-style:italic; margin-bottom:10px; }
.panel-q::before { content:"Помисли: "; font-style:normal; font-weight:500; }
.panel-teacher-action { font-size:13px; color:var(--color-text-primary); background:var(--color-background-info); border-left:2px solid var(--color-border-info); padding:8px 12px; border-radius:0 var(--border-radius-md) var(--border-radius-md) 0; margin-bottom:10px; }
.panel-teacher-action::before { content:"Какво може да направи учителят: "; font-weight:500; }
.panel-tag { display:inline-block; font-size:11px; padding:2px 8px; border-radius:10px; margin-right:4px; margin-top:4px; }
.tag-context{background:#E1F5EE;color:#085041;} .tag-mech{background:#EEEDFE;color:#3C3489;} .tag-teacher{background:#FAECE7;color:#712B13;} .tag-knowledge{background:#FAEEDA;color:#633806;}

.principles-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(210px, 1fr)); gap:8px; margin-top:16px; }
.principle-card { background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:12px 14px; cursor:pointer; border:0.5px solid transparent; transition:all 0.15s; }
.principle-card:hover { border-color:var(--color-border-secondary); background:var(--color-background-primary); }
.principle-text { font-size:13px; font-weight:500; color:var(--color-text-primary); margin-bottom:3px; line-height:1.4; }
.principle-source { font-size:11px; color:var(--color-text-secondary); }
.principle-expand { display:none; font-size:12px; color:var(--color-text-secondary); line-height:1.65; margin-top:8px; border-top:0.5px solid var(--color-border-tertiary); padding-top:8px; }
.principle-expand.open { display:block; }
.section-label { font-size:11px; color:var(--color-text-secondary); text-transform:uppercase; letter-spacing:0.06em; font-weight:500; margin-bottom:8px; margin-top:20px; }
</style>

const nodes = {
  'env-space':{ title:'Физическа среда', body:'Прекомерно наредените или декорирани стаи отклоняват вниманието. Шумът и акустичният хаос увеличават когнитивния товар преди задачата да е започнала.', q:'Погледни стаята, в която преподаваш. Кое в нея отклонява вниманието на учениците, освен теб?', tags:['context'] },
  'env-social':{ title:'Социална среда', body:'Мозъкът обработва социалното изключване в същите региони, в които обработва физическата болка. Принадлежността не е просто добра атмосфера — тя е предпоставка за учене.', q:'Има ли ученик, за когото не знаеш дали се чувства приет от групата?', tags:['context'] },
  'env-task':{ title:'Задачата и видовете знание', body:'Не всичко се учи по един начин. Декларативното знание (факти) изисква различен дизайн от процедурното (умения) и условното (кога и защо да приложиш кое).\n\nФакти и умения са неразделни — критичното мислене зависи от предметно знание.', q:'В последния ти урок — какъв вид знание преподаваше? Беше ли дизайнът подходящ?', action:'Провери: задачата изисква ли реално мислене, или само следване на процедура? Ако е само процедура — добави елемент на сравнение, обяснение или приложение в нов контекст.', tags:['knowledge','teacher'] },
  'teacher-node':{ title:'Учителят като проектант', body:'Учителят влияе на всяка точка от картата: проектира средата, избира задачата, управлява вниманието, дозира товара, дава обратна връзка, планира практиката. Не е предавател на информация — той е архитект на условията.', q:'За кое от тези действия се чувстваш най-уверен? За кое — най-несигурен?', action:'Избери едно действие, върху което да работиш съзнателно следващата седмица. Не повече от едно.', tags:['teacher'] },
  'env-family':{ title:'Семейство и житейски опит', body:'Ученето се надгражда върху съществуващ опит. Семейният контекст и предишните учебни преживявания оформят схемите, с които ученикът влиза в класната стая.', q:'Какво знаеш за семейния контекст на учениците? Как влияе той на отношението им към предмета?', tags:['context'] },
  'inner-safe':{ title:'Психологическа безопасност', body:'Когато ученикът се чувства застрашен, амигдалата се активира и физически блокира пътя към префронталния кортекс. Ученето е биологично невъзможно в страх.', q:'Как разбираш кога ученик се чувства несигурен? По какво невербално го забелязваш?', action:'Провери дали грешките в часа се третират като информация или като провал. Ако учениците се страхуват да сгрешат — безопасността е проблемът, не мотивацията.', tags:['context'] },
  'inner-efficacy':{ title:'Самоефикасност', body:'Вярата, че можеш да успееш, е различна от реалните умения. Ученик с ниска самоефикасност избягва предизвикателства дори когато е способен. Оптималното учене е при ~80% успеваемост.', q:'Имаш ли ученик, който явно може, но не опитва? Какво мислиш, че стои зад това?', action:'Намали нивото на задачата временно така, че ученикът да преживее успех. После постепенно увеличи трудността. Самоефикасността се гради от преживян успех, не от окуражаване.', tags:['context'] },
  'inner-prior':{ title:'Предишни знания', body:'Мозъкът не започва от нула. Новото знание се свързва с вече съществуващи схеми. Без активиране на предишни знания информацията "лебди" без котва. Важно: предишните знания могат да включват погрешни представи, които трябва да се адресират.', q:'Как активираш предишните знания? Проверяваш ли дали са верни, или само дали съществуват?', action:'Преди да въведеш нов материал — задай въпрос, който изважда на повърхността какво знаят учениците. Погрешните представи са по-опасни от незнанието.', tags:['context','mech'] },
  'inner-state':{ title:'Физическо и емоционално състояние', body:'Сън, хидратация и базово физическо благополучие са биологични условия за работната памет. Уморен ученик разполага буквално с по-малко когнитивен ресурс.', q:'Кога последно си забелязал, че физическото състояние видимо влияе на урока?', tags:['context'] },
  'inner-motivation':{ title:'Смисъл и мотивация', body:'Допаминът е свързан с предвиждането на успех. Когато ученикът вижда защо нещо има значение лично за него, мозъкът инвестира внимание. Без смисъл информацията се филтрира преди да е влязла в работната памет.', q:'За последния ти урок — смисълът на задачата беше ли ясен за учениците, или само за теб?', action:'Добави едно изречение в началото на урока, което свързва темата с нещо, което учениците вече имат причина да ги е грижа. Не общо "ще ви е нужно" — конкретно и лично.', tags:['context'] },
  'student-center':{ title:'Ученикът, изправен пред задача', body:'Всяко учене започва от срещата между ученик и задача. Ученикът не е чист лист — идва с история: предишни знания и погрешни разбирания, емоционални асоциации, вяра или неверие в собствените си способности.', q:'Знаеш ли кой ученик идва с най-много погрешни разбирания по предстоящата тема? Имаш ли план за тях?', tags:['context','knowledge'] },
  'cog-attention':{ title:'Внимание — входната точка', body:'Информация, която не е забелязана, не достига до работната памет. Вниманието е ограничено и лесно отклонимо.\n\nВнимание ≠ интерес. Нещо може да привлече вниманието, но да насочи мисленето към нерелевантното.', q:'Вниманието на учениците беше ли насочено към правилното нещо, или беше "включено", но грешно насочено?', action:'Провери: в най-активната дейност на последния ти урок — за какво конкретно мислеха учениците? Ако не можеш да отговориш — там е проблемът.', tags:['mech'] },
  'cog-wm':{ title:'Работна памет — тясното гърло', body:'Работната памет обработва ~4–7 нови елемента едновременно. Три вида товар:\n• Вътрешен — сложността на темата (може да се раздроби)\n• Излишен — лош дизайн, неясни инструкции (трябва да се елиминира)\n• Полезен — усилието за разбиране (трябва да се насърчи)', q:'Дал ли си някога пет инструкции наведнъж? Какво се е случило след това?', action:'Раздроби следващото обяснение на части — представи едната, накарай учениците да я приложат, после мини към следващата. Не давай цялото преди практиката.', tags:['mech'] },
  'cog-ltm':{ title:'Дългосрочна памет — целта', body:'Учене = трайна промяна в дългосрочната памет. Ако нищо не е променено там, нищо не е научено. Знанието се съхранява като схеми. Дългосрочната памет влияе обратно на работната — автоматизираното знание освобождава ресурс.', q:'Как разбираш, че нещо е влязло в дългосрочната памет — а не само е "разбрано" в часа?', action:'Следващия час започни с 3-минутно свободно извличане — учениците пишат всичко, което помнят от предишния час, без бележки. После проверяват. Това е единственият начин да разбереш какво реално е останало.', tags:['mech'] },
  'cog-practice':{ title:'Упражняване — трайното учене', body:'Шест стратегии с доказана ефективност:\n• Извличане — активно припомняне без подсказки\n• Разпределена практика — на интервали от време\n• Редуване — смесване на различни типове задачи\n• Двойно кодиране — думи и смислени визуали\n• Обогатяване — свързване с личен контекст\n• Конкретни примери — за намиране на дълбоката структура', q:'Коя от тези стратегии използваш редовно? Коя никога не си пробвал?', action:'Планирай кога учениците ще се върнат към днешния материал — не утре, а след 3-4 дни. Едно кратко извличане (5 мин) без подсказки е по-ефективно от час преговор с отворени книги.', tags:['mech','teacher'] },

const principles = [
  { text:'Паметта е отпечатък на мисълта', source:'Willingham, 2009', detail:'Не какво правят учениците, а за какво мислят. Активност не е учене.' },

let activeScenario = null;

function applyScenario(key) {
  const sc = scenarios[key];
  if (!sc) return;
  activeScenario = key;

  // Update buttons
  document.querySelectorAll('.sc-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('sc-reset').style.display = 'inline-block';

  // All elements: first reset
  document.querySelectorAll('.map-el').forEach(el => {
    el.classList.remove('lit','dimmed','ctx-default');
  });

  // Apply lit
  sc.lit.forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.add('lit'); el.style.pointerEvents = 'auto'; }
  });

  // Apply dim
  sc.dim.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('dimmed');
  });

  // Explanation
  document.getElementById('sc-exp-title').textContent = sc.title;
  document.getElementById('sc-exp-body').textContent = sc.body;
  const chainEl = document.getElementById('sc-exp-chain');
  chainEl.innerHTML = sc.chain.map(c =>
    c.cls === 'chain-arrow'
      ? `<span class="chain-arrow">${c.label}</span>`
      : `<span class="sc-chain-item ${c.cls}">${c.label}</span>`
  ).join('');
  document.getElementById('sc-explanation').classList.add('visible');

  // Close detail panel
  document.getElementById('detail-panel').classList.remove('visible');
}

function resetScenario() {
  activeScenario = null;
  document.querySelectorAll('.sc-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sc-reset').style.display = 'none';
  document.getElementById('sc-explanation').classList.remove('visible');
  document.querySelectorAll('.map-el').forEach(el => {
    el.classList.remove('lit','dimmed');
    if (!el.classList.contains('flow-node') && !el.classList.contains('flow-line')) {
      el.classList.add('ctx-default');
    }
  });
  document.getElementById('detail-panel').classList.remove('visible');
}

function handleClick(el, id) {
  show(id);
}

function show(id) {
  const node = nodes[id];
  if (!node) return;
  document.getElementById('panel-title').textContent = node.title;
  document.getElementById('panel-body').innerHTML = node.body.replace(/\n/g,'<br>');
  const aEl = document.getElementById('panel-action');
  if (node.action && activeScenario) { aEl.textContent = node.action; aEl.style.display='block'; }
  else { aEl.style.display='none'; }
  const qEl = document.getElementById('panel-q');
  if (node.q) { qEl.textContent = node.q; qEl.style.display='block'; } else { qEl.style.display='none'; }
  const tagMap = { context:['context','Контекст'], mech:['mech','Механизъм'], teacher:['teacher','Учител'], knowledge:['knowledge','Знание'] };
  document.getElementById('panel-tags').innerHTML = (node.tags||[]).map(t => {
    const [cls,label] = tagMap[t]||['context',t];
    return `<span class="panel-tag tag-${cls}">${label}</span>`;
  }).join('');
  document.getElementById('detail-panel').classList.add('visible');
  document.getElementById('detail-panel').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function closePanel() { document.getElementById('detail-panel').classList.remove('visible'); }

const grid = document.getElementById('principles-grid');
principles.forEach((p,i) => {
  const card = document.createElement('div');
  card.className = 'principle-card';
  card.innerHTML = `<div class="principle-text">${p.text}</div><div class="principle-source">${p.source}</div><div class="principle-expand" id="pexp-${i}">${p.detail}</div>`;
  card.onclick = () => document.getElementById('pexp-'+i).classList.toggle('open');
  grid.appendChild(card);
});
</script>
